<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Template</title>
    <!--base-->
    <script>
        {
            const key = "mantine-color-scheme-value";
            const stored = window.localStorage.getItem(key);
            const scheme = ["light", "dark", "auto"].includes(stored) ? stored : "auto";
            const resolved = scheme === "auto"
                ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
                : scheme;

            document.documentElement.setAttribute("data-mantine-color-scheme", resolved);

            window.__APP__ = {
                basePath: document.querySelector("base")?.getAttribute("href"),
            };
        }
    </script>
</head>

<body>
    <div id="root"><!--content--></div>
    <!--ssr-state-->
</body>

</html>
